<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBE Fleet Dashboard | Golden Bear Equipment Co.</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0B1120;--card:#0F1829;--border:rgba(255,255,255,0.06);
  --gold:#D4A017;--gold-dim:rgba(212,160,23,0.12);
  --green:#22C55E;--yellow:#EAB308;--red:#EF4444;--orange:#F97316;--blue:#3B82F6;
  --white:#F1F5F9;--gray:#64748B;--gray-dark:#334155;--gray-light:#94A3B8;
}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden;-webkit-font-smoothing:antialiased;font-size:13px}
header{background:var(--card);border-bottom:2px solid var(--gold);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800}
.logo .accent{color:var(--gold)}
.tabs{display:flex;gap:2px}
.tab{background:transparent;color:var(--gray);border:none;padding:6px 14px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer}
.tab.active{background:var(--gold);color:#111}
.main-content{padding:16px 20px;max-width:1200px;margin:0 auto}
.stats-row{display:grid;gap:8px;margin-bottom:20px}
.stats-6{grid-template-columns:repeat(6,1fr)}
.stats-3{grid-template-columns:repeat(3,1fr)}
.stat{background:var(--card);border:1px solid var(--border);padding:14px 16px;text-align:center}
.stat-n{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800}
.stat-l{font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:20px 0 12px}
.card{background:var(--card);border:1px solid var(--border)}
.card-header{display:grid;padding:8px 16px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray);background:rgba(212,160,23,0.04)}
.issue-row{padding:10px 16px;border-bottom:1px solid var(--border);display:grid;align-items:start;gap:8px}
.issue-row.oos{background:rgba(239,68,68,0.04)}
.issue-row.closed{opacity:0.5}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;margin-top:4px}
.dot-oos{background:var(--red)}
.dot-att{background:var(--yellow)}
.dot-green{background:var(--green)}
.dot-sm{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.badge{font-size:9px;font-weight:700;padding:2px 6px;letter-spacing:1px;text-transform:uppercase;display:inline-block}
.badge-red{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.badge-yellow{background:rgba(234,179,8,0.12);color:var(--yellow);border:1px solid rgba(234,179,8,0.2)}
.badge-green{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.badge-orange{background:rgba(249,115,22,0.12);color:var(--orange);border:1px solid rgba(249,115,22,0.2)}
.badge-gold{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,160,23,0.25)}
.btn-address{background:var(--gold);color:#111;border:none;padding:3px 8px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;cursor:pointer}
.btn-close{background:var(--gold);color:#111;border:none;padding:10px 24px;font-size:12px;font-weight:700;cursor:pointer}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--gray);padding:10px 24px;font-size:12px;cursor:pointer}
.filter-row{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.filter-label{font-size:10px;color:var(--gray);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.filter-btn{padding:3px 8px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--gray)}
.filter-btn.active{background:var(--gold-dim);border-color:rgba(212,160,23,0.25);color:var(--gold)}
.repeat-alert{background:rgba(249,115,22,0.06);border:1px solid rgba(249,115,22,0.15);padding:14px;margin-bottom:16px}
.repeat-title{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.grid-7{grid-template-columns:24px 100px 100px 1fr 100px 50px 70px}
.grid-4{grid-template-columns:100px 120px 1fr 100px}
.grid-5{grid-template-columns:200px 80px 80px 80px 1fr}
.grid-4s{grid-template-columns:120px 80px 100px 100px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:var(--card);border:2px solid var(--gold);width:520px;max-height:85vh;overflow:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-body{padding:16px 20px}
textarea{width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--white);font-family:'Barlow',sans-serif;font-size:13px;resize:vertical;outline:none;line-height:1.5;border-radius:0}
.notify-bar{margin-top:12px;padding:10px 12px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.12);font-size:11px;color:var(--blue)}
.bar-chart-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.bar-chart-label{width:80px;font-size:11px;color:var(--gray-dark)}
.bar-chart-track{flex:1;height:20px;background:rgba(51,65,81,0.2);position:relative}
.bar-chart-fill{height:100%;background:var(--gold)}
.bar-chart-val{width:30px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--gold)}
.hidden{display:none}
.text-gray{color:var(--gray)}
.text-gray-dark{color:var(--gray-dark)}
.text-gray-light{color:var(--gray-light)}
.text-gold{color:var(--gold)}
.text-red{color:var(--red)}
.text-green{color:var(--green)}
.text-orange{color:var(--orange)}
.text-yellow{color:var(--yellow)}
.text-blue{color:var(--blue)}
.fw700{font-weight:700}
.fw800{font-weight:800}
.fs11{font-size:11px}
.fs10{font-size:10px}
.fs12{font-size:12px}
.fs16{font-size:16px}
.mt4{margin-top:4px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mb8{margin-bottom:8px}
@media(max-width:768px){
  .stats-6{grid-template-columns:repeat(3,1fr)}
  .grid-7{grid-template-columns:24px 80px 1fr 60px 50px}
  .grid-7 .hide-mobile{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="accent">GBE</span> Fleet Dashboard</div>
  <div class="tabs">
    <button class="tab active" data-view="live">Live Board</button>
    <button class="tab" data-view="compliance">Compliance</button>
    <button class="tab" data-view="operators">Operators</button>
    <button class="tab" data-view="service">Service</button>
    <button class="tab" data-view="transfers">Transfers</button>
    <button class="tab" data-view="verification">Verification <span id="verifBadge" style="display:none;background:#E74C3C;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;margin-left:4px"></span></button>
  </div>
</header>

<div id="view-live" class="main-content"></div>
<div id="view-compliance" class="main-content hidden"></div>
<div id="view-operators" class="main-content hidden"></div>
<div id="view-service" class="main-content hidden"></div>
<div id="view-transfers" class="main-content hidden"></div>
<div id="view-verification" class="main-content hidden"></div>
<div id="modal-container"></div>

<script>
// ============================================================
// GBE FLEET DASHBOARD - VANILLA JS
// Google Sheets Integration Ready
// ============================================================

// --- CONFIG ---
// Sahan: Replace this URL with the Google Apps Script web app URL
// that reads from the inspection Google Sheet
const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycbyydG9QVGP1OqAj_d5cQdbf4MotcUZ5EmAkHlVguNUjBMz9OvrzApfHnodCc1FrYCM7Lg/exec";

const YUCAIPA = { lat: 34.03, lng: -117.04 };
const SERVICE_INTERVALS = [250, 500, 1000, 2000, 3000, 5000];

const JOB_NAMES = {
  "26059":"EV Fleet Palm Springs","26091":"Vernon BNSF","26053":"Crimson Midstream Carson",
  "22522":"SpaceX Hawthorne","24504":"BNSF Pico","22506":"SpaceX",
  "26110":"Transfer","22205":"Riverside","12050":"Yard","26040":"Phoenix UP Auto Yard",
  "26125":"Narrows Sub Pico Rivera","26501":"Kaiser Brea EVCR",
  "25252":"CSAS Covina SCE","25111":"Transfer Origin"
};

const UNIT_TYPES = {
  EX:"Excavator",SL:"Skip Loader",SS:"Skid Steer",DZ:"Dozer",WT:"Water Truck",
  CT:"Crane",LD:"Lowbed",BH:"Backhoe",VEH:"Vehicle",SB:"Sideboom",
  RL:"Reach Lift",DT:"Dump Truck",TH:"Telehandler"
};

function calcDist(lat, lng) {
  if (!lat || !lng) return 0;
  return Math.round(Math.sqrt(Math.pow((lat - YUCAIPA.lat) * 69, 2) + Math.pow((lng - YUCAIPA.lng) * 55, 2)));
}

function distColor(d) { return d > 100 ? 'var(--red)' : d > 50 ? 'var(--orange)' : 'var(--green)'; }

// --- STATE ---
let INSPECTIONS = [];
let dispositions = JSON.parse(localStorage.getItem('gbe_dispositions') || '{}');
let currentView = 'live';
let filterAlert = 'ALL';
let filterStatus = 'ALL';

// --- SAMPLE DATA (will be replaced by Google Sheets fetch) ---
const SAMPLE_DATA = [
  {id:"GBE-20260511-084958",date:"2026-05-11",operator:"Juan Barron",type:"daily",unit:"EX04-690",unitType:"EX",job:"26059",site:"Palm Springs service center cathedral city",hours:10,fuel:"3/4",alert:"NEEDS_ATTENTION",issues:[{part:"Physical",detail:"Torn tracks",level:"attention"},{part:"Track Pads",detail:"Torn track pads",level:"attention"}],photos:1,lat:33.83,lng:-116.45},
  {id:"GBE-20260511-083637",date:"2026-05-11",operator:"Juan Barron",type:"daily",unit:"EX36-6151",unitType:"EX",job:"26059",site:"Palm Springs service center cathedral city",hours:196.3,fuel:"1/2",alert:"NEEDS_ATTENTION",issues:[{part:"Fire Extinguisher",detail:"Equipment doesn't have a fire extinguisher",level:"attention"}],photos:0,lat:33.83,lng:-116.45},
  {id:"GBE-20260508-080150",date:"2026-05-08",operator:"Jerry Neuman Jr.",type:"daily",unit:"EX18-6114",unitType:"EX",job:"26091",site:"Vernon BNSF",hours:783,fuel:"3/4",alert:"NEEDS_ATTENTION",issues:[{part:"Track Pads",detail:"Slight damage on one rubber track",level:"attention"}],photos:1,lat:34.00,lng:-118.23},
  {id:"GBE-20260507-192159",date:"2026-05-07",operator:"Cooper Wagner",type:"daily",unit:"EX12-6053",unitType:"EX",job:"26053",site:"Crimson midstream Carson",hours:2953.4,fuel:"3/4",alert:"NEEDS_ATTENTION",issues:[{part:"Physical",detail:"Some prior bent lines"},{part:"Engine",detail:"Engine fault, loses power ~10 sec after start",level:"attention"}],photos:0,lat:33.83,lng:-118.26},
  {id:"GBE-20260507-170625",date:"2026-05-07",operator:"Jerry N",type:"daily",unit:"UT37-3065",unitType:"VEH",job:"",site:"",hours:190000,fuel:"1/2",alert:"NEEDS_ATTENTION",issues:[{part:"Body Damage",detail:"Dents",level:"attention"},{part:"Belts/Hoses",detail:"Starting to squeal",level:"attention"},{part:"Interior",detail:"Time to wash",level:"attention"},{part:"Toolbox",detail:"Dented by skid steer bucket",level:"attention"}],photos:0,lat:33.95,lng:-117.40},
  {id:"GBE-20260507-191056",date:"2026-05-07",operator:"Karun Mani",type:"transfer",unit:"BH-UNK",unitType:"BH",job:"26040",site:"Phoenix",hours:123456,fuel:"1/2",alert:"OUT_OF_SERVICE",issues:[{part:"Loader Teeth",detail:"Worn",level:"oos"},{part:"Stabilizer Pads",detail:"Worn",level:"oos"},{part:"4WD",detail:"Needs check",level:"attention"},{part:"Cab/ROPS",detail:"Damage",level:"attention"}],photos:0,transferFrom:"25252",lat:33.44,lng:-112.07},
  {id:"GBE-20260506-162323",date:"2026-05-06",operator:"Kirby",type:"daily",unit:"SB06-6091",unitType:"DZ",job:"12050",site:"Yard",hours:0,fuel:"Empty",alert:"OUT_OF_SERVICE",issues:[{part:"Engine",detail:"Won't start!",level:"oos"},{part:"Rollers",detail:"Worn",level:"oos"},{part:"End Bits",detail:"Worn",level:"attention"}],photos:1,lat:33.95,lng:-117.40},
  {id:"GBE-20260506-150650",date:"2026-05-06",operator:"sahan",type:"daily",unit:"CT01-459",unitType:"CT",job:"22205",site:"Riverside",hours:12458,fuel:"3/4",alert:"OUT_OF_SERVICE",issues:[{part:"Horn",detail:"",level:"oos"},{part:"Sheaves",detail:"",level:"oos"},{part:"Hook",detail:"",level:"oos"},{part:"LMI",detail:"",level:"oos"}],photos:2,lat:33.95,lng:-117.40},
  {id:"GBE-20260506-102630",date:"2026-05-06",operator:"Kirby Hays",type:"transfer",unit:"WT06",unitType:"WT",job:"26110",site:"The moon",hours:25000,fuel:"Empty",alert:"OUT_OF_SERVICE",issues:[{part:"Hydraulic Fluid",detail:"Leaking like crazy",level:"oos"},{part:"Coupling",detail:"Blown hose",level:"oos"}],photos:1,transferFrom:"25111",lat:33.95,lng:-117.40},
  {id:"INS-20260501-113330",date:"2026-05-01",operator:"Kirby",type:"daily",unit:"SS09",unitType:"SS",job:"22506",site:"Spacex",hours:250,fuel:"3/4",alert:"OUT_OF_SERVICE",issues:[{part:"Lights",detail:"",level:"oos"},{part:"Boom/Stick",detail:"",level:"oos"},{part:"Guards/Safety",detail:"",level:"oos"}],photos:0,lat:33.92,lng:-118.33},
  {id:"INS-20260430-064458",date:"2026-04-30",operator:"Kirby hays",type:"daily",unit:"SL05",unitType:"SL",job:"22522",site:"SpaceX hawthorne",hours:22555,fuel:"1/2",alert:"OUT_OF_SERVICE",issues:[{part:"Horn",detail:"",level:"oos"},{part:"Boom/Stick",detail:"",level:"oos"},{part:"Guards/Safety",detail:"",level:"oos"}],photos:1,lat:33.92,lng:-118.33},
  {id:"INS-20260430-102901",date:"2026-04-30",operator:"Kirby",type:"daily",unit:"LD04",unitType:"LD",job:"24504",site:"BNSF pico",hours:2564,fuel:"1/2",alert:"OUT_OF_SERVICE",issues:[{part:"Fire Extinguisher",detail:"Needs one",level:"oos"},{part:"Pins/Bushings",detail:"Haven't greased in 12 days",level:"attention"}],photos:1,lat:33.98,lng:-118.10}
];

var PENDING_VERIF = [];

// --- LOAD DATA ---
async function loadData() {
  if (GOOGLE_SHEET_API) {
    try {
      const resp = await fetch(GOOGLE_SHEET_API + '?action=inspections');
      INSPECTIONS = await resp.json();
      
      // Also load dispositions from server
      try {
        const dispResp = await fetch(GOOGLE_SHEET_API + '?action=dispositions');
        const serverDisps = await dispResp.json();
        // Merge server dispositions with any local ones
        dispositions = Object.assign({}, serverDisps, dispositions);
        localStorage.setItem('gbe_dispositions', JSON.stringify(dispositions));
      } catch(e) {
        console.log('Could not load dispositions from server, using local');
      }
    } catch(e) {
      console.error('Failed to load from Google Sheets, using sample data', e);
      INSPECTIONS = SAMPLE_DATA;
    }
  } else {
    INSPECTIONS = SAMPLE_DATA;
  }
  try {
    if (GOOGLE_SHEET_API) {
      const pvResp = await fetch(GOOGLE_SHEET_API + '?action=pendingVerification');
      PENDING_VERIF = await pvResp.json();
    }
  } catch(e) { console.log('Pending verification load failed', e); }
  renderAll();
}

// --- COMPUTED DATA ---
function getGroupedIssues() {
  const groups = [];
  INSPECTIONS.forEach(ins => {
    if (ins.issues.length === 0) return;
    const allClosed = ins.issues.every((_,idx) => !!dispositions[ins.id+'-'+idx]);
    const level = ins.issues.some(i => (i.level||'attention')==='oos') ? 'oos' : 'attention';
    groups.push({
      key: ins.id, date: ins.date, unit: ins.unit, unitType: ins.unitType,
      unitTypeName: UNIT_TYPES[ins.unitType] || ins.unitType,
      operator: ins.operator, job: ins.job,
      jobName: JOB_NAMES[ins.job] || ins.site || '',
      site: ins.site, type: ins.type, transferFrom: ins.transferFrom,
      issues: ins.issues.map((iss,idx) => ({
        ...iss, subKey: ins.id+'-'+idx, level: iss.level||'attention',
        closed: !!dispositions[ins.id+'-'+idx],
        disposition: dispositions[ins.id+'-'+idx] || null
      })),
      level, dist: calcDist(ins.lat, ins.lng), closed: allClosed,
      lat: ins.lat, lng: ins.lng
    });
  });
  groups.sort((a,b) => {
    if (a.closed !== b.closed) return a.closed ? 1 : -1;
    if (a.level==='oos' && b.level!=='oos') return -1;
    if (a.level!=='oos' && b.level==='oos') return 1;
    return b.date.localeCompare(a.date);
  });
  return groups;
}

function getFlatIssues() {
  const flat = [];
  INSPECTIONS.forEach(ins => {
    ins.issues.forEach((iss,idx) => {
      flat.push({key:ins.id+'-'+idx, unit:ins.unit, part:iss.part, detail:iss.detail, level:iss.level||'attention', date:ins.date, closed:!!dispositions[ins.id+'-'+idx]});
    });
  });
  return flat;
}

function getRepeatOffenders() {
  const counts = {};
  getFlatIssues().forEach(i => {
    const k = i.unit+'|||'+i.part;
    if (!counts[k]) counts[k] = {unit:i.unit, part:i.part, count:0, dates:[]};
    counts[k].count++;
    if (!counts[k].dates.includes(i.date)) counts[k].dates.push(i.date);
  });
  return Object.values(counts).filter(c => c.count >= 2).sort((a,b) => b.count - a.count);
}

function getOperatorStats() {
  const ops = {};
  INSPECTIONS.forEach(ins => {
    const name = ins.operator.trim().toLowerCase();
    if (!ops[name]) ops[name] = {name:ins.operator, total:0, allGood:0, withIssues:0};
    ops[name].total++;
    if (ins.issues.length === 0) ops[name].allGood++;
    else ops[name].withIssues++;
  });
  return Object.values(ops).sort((a,b) => b.total - a.total);
}

function getServiceAlerts() {
  const unitMap = {};
  INSPECTIONS.forEach(ins => {
    if (!ins.unit || ins.hours > 50000 || !ins.hours) return;
    if (!unitMap[ins.unit] || ins.date > unitMap[ins.unit].date) {
      unitMap[ins.unit] = {unit:ins.unit, type:ins.unitType, hours:ins.hours, date:ins.date};
    }
  });
  const alerts = [];
  Object.values(unitMap).forEach(u => {
    SERVICE_INTERVALS.forEach(interval => {
      const next = Math.ceil(u.hours / interval) * interval;
      const rem = next - u.hours;
      if (rem <= 50 && rem > 0) {
        alerts.push({unit:u.unit, type:u.type, hours:u.hours, next, remaining:Math.round(rem*10)/10});
      }
    });
  });
  return alerts;
}

// --- RENDER FUNCTIONS ---
function renderAll() {
  renderLive();
  renderVerification();
  renderCompliance();
  renderOperators();
  renderService();
  renderTransfers();
}

function renderLive() {
  const groups = getGroupedIssues();
  const flat = getFlatIssues();
  const openFlat = flat.filter(i => !i.closed);
  const oosCount = openFlat.filter(i => i.level==='oos').length;
  const attCount = openFlat.filter(i => i.level==='attention').length;
  const closedCount = Object.keys(dispositions).length;
  const repeats = getRepeatOffenders();

  const filtered = groups.filter(g => {
    if (filterAlert==='oos' && g.level!=='oos') return false;
    if (filterAlert==='attention' && g.level!=='attention') return false;
    if (filterStatus==='open' && g.closed) return false;
    if (filterStatus==='closed' && !g.closed) return false;
    return true;
  });

  let html = `
    <div class="stats-row stats-6">
      <div class="stat"><div class="stat-n" style="color:var(--red)">${oosCount}</div><div class="stat-l">Out of Service</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--yellow)">${attCount}</div><div class="stat-l">Needs Attention</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--green)">${closedCount}</div><div class="stat-l">Resolved</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--orange)">${repeats.length}</div><div class="stat-l">Repeat Issues</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--blue)">${groups.filter(g=>!g.closed).length}</div><div class="stat-l">Open Inspections</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--gray-light)">${new Set(INSPECTIONS.map(i=>i.unit).filter(Boolean)).size}</div><div class="stat-l">Units Tracked</div></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Severity:</span>
      <button class="filter-btn ${filterAlert==='ALL'?'active':''}" onclick="setFilter('alert','ALL')">All</button>
      <button class="filter-btn ${filterAlert==='oos'?'active':''}" onclick="setFilter('alert','oos')">OOS Only</button>
      <button class="filter-btn ${filterAlert==='attention'?'active':''}" onclick="setFilter('alert','attention')">Attention Only</button>
      <span style="color:var(--gray-dark)">|</span>
      <span class="filter-label">Status:</span>
      <button class="filter-btn ${filterStatus==='ALL'?'active':''}" onclick="setFilter('status','ALL')">All</button>
      <button class="filter-btn ${filterStatus==='open'?'active':''}" onclick="setFilter('status','open')">Open</button>
      <button class="filter-btn ${filterStatus==='closed'?'active':''}" onclick="setFilter('status','closed')">Closed</button>
    </div>`;

  if (repeats.length > 0) {
    html += `<div class="repeat-alert"><div class="repeat-title">🔁 Repeat Issues Detected</div>`;
    repeats.forEach(r => {
      html += `<div class="fs12 text-gray-light" style="padding:3px 0"><span class="fw700 text-orange">${r.unit}</span> - ${r.part} reported ${r.count}x (${r.dates.join(', ')})</div>`;
    });
    html += `</div>`;
  }

  html += `<div class="card">
    <div class="card-header grid-7"><div></div><div>Unit</div><div>Job</div><div>Issues</div><div class="hide-mobile">Location</div><div>Dist</div><div>Action</div></div>`;

  filtered.forEach(g => {
    const rowClass = g.closed ? 'closed' : g.level==='oos' ? 'oos' : '';
    html += `<div class="issue-row grid-7 ${rowClass}">
      <div class="dot ${g.level==='oos'?'dot-oos':'dot-att'}"></div>
      <div>
        <div class="fw700 fs12">${g.unit}</div>
        <div class="fs10 text-gray-dark">${g.unitTypeName}</div>
        <div class="fs10 text-gray-dark">${g.date}</div>
      </div>
      <div>
        <div class="fw700 fs11">${g.job||'-'}</div>
        <div class="fs10 text-gray-dark">${g.jobName}</div>
      </div>
      <div>`;
    g.issues.forEach(iss => {
      html += `<div style="padding:2px 0;display:flex;align-items:center;gap:6px">
        <span class="dot-sm" style="background:${iss.level==='oos'?'var(--red)':'var(--yellow)'}"></span>
        <span class="fw700 fs12">${iss.part}:</span>
        <span class="fs11 text-gray-light">${iss.detail||'No details'}</span>
        ${iss.closed ? '<span class="fs10 text-green" style="margin-left:4px">✓ '+iss.disposition.note+'</span>' : ''}
      </div>`;
    });
    html += `<div class="fs10 text-gray-dark mt4">Reported by: ${g.operator}</div></div>
      <div class="fs11 text-gray-dark hide-mobile">${g.site||'Yard'}</div>
      <div class="fw700 fs12" style="color:${distColor(g.dist)}">${g.dist}</div>
      <div>${g.closed ? '<span class="badge badge-green">Closed</span>' : `<button class="btn-address" onclick="openModal('${g.key}')">Address</button>`}</div>
    </div>`;
  });

  html += `</div>`;
  document.getElementById('view-live').innerHTML = html;
}

function renderCompliance() {
  const byDate = {};
  INSPECTIONS.forEach(ins => { byDate[ins.date] = (byDate[ins.date]||0) + 1; });
  const dates = Object.entries(byDate).sort((a,b) => a[0].localeCompare(b[0]));
  const maxC = Math.max(...dates.map(d => d[1]), 1);

  let html = `<div class="section-title">Inspection Volume by Day</div>
    <div class="card" style="padding:20px">`;
  dates.forEach(([date, count]) => {
    html += `<div class="bar-chart-row">
      <div class="bar-chart-label">${date}</div>
      <div class="bar-chart-track"><div class="bar-chart-fill" style="width:${(count/maxC)*100}%"></div></div>
      <div class="bar-chart-val">${count}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('view-compliance').innerHTML = html;
}

function renderOperators() {
  const stats = getOperatorStats();
  let html = `<div class="section-title">Operator Accountability</div><div class="card">
    <div class="card-header grid-5"><div>Operator</div><div>Total</div><div>Issues</div><div>All Good</div><div>Grade</div></div>`;
  stats.forEach(op => {
    const rate = op.total > 0 ? op.allGood / op.total : 0;
    const suspicious = op.total >= 5 && rate >= 0.95;
    let grade, gradeColor;
    const quality = op.total > 0 ? op.withIssues / op.total : 0;
    if (quality >= 0.15 && quality <= 0.6) { grade='A'; gradeColor='var(--green)'; }
    else if (quality > 0.6) { grade='B'; gradeColor='var(--yellow)'; }
    else if (suspicious) { grade='F'; gradeColor='var(--red)'; }
    else if (op.total < 3) { grade='-'; gradeColor='var(--gray-dark)'; }
    else { grade='C'; gradeColor='var(--orange)'; }

    html += `<div class="issue-row grid-5" style="${suspicious?'background:rgba(249,115,22,0.04)':''}">
      <div class="fw700">${op.name}</div><div>${op.total}</div>
      <div style="color:${op.withIssues>0?'var(--yellow)':'var(--gray-dark)'}">${op.withIssues}</div>
      <div>${op.allGood}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="fw800 fs16" style="color:${gradeColor}">${grade}</span>
        ${suspicious ? '<span class="badge badge-red">⚠️ Rubber Stamping?</span>' : ''}
        ${op.total < 3 ? '<span class="fs10 text-gray-dark">Low volume</span>' : ''}
      </div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('view-operators').innerHTML = html;
}

function renderService() {
  const alerts = getServiceAlerts();
  const unitMap = {};
  INSPECTIONS.forEach(ins => {
    if (!ins.unit || ins.hours > 50000 || !ins.hours) return;
    if (!unitMap[ins.unit] || ins.date > unitMap[ins.unit].date) {
      unitMap[ins.unit] = {unit:ins.unit, type:ins.unitType, hours:ins.hours, date:ins.date};
    }
  });
  const unitList = Object.values(unitMap).sort((a,b) => b.hours - a.hours);

  let html = `<div class="section-title">Service Interval Alerts</div>`;
  if (alerts.length === 0) {
    html += `<div class="card" style="padding:24px;text-align:center;color:var(--green)">No units approaching service intervals.</div>`;
  } else {
    html += `<div class="card">`;
    alerts.forEach(a => {
      html += `<div class="issue-row" style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="fw700">${a.unit}</div><div class="fs10 text-gray-light">${UNIT_TYPES[a.type]||a.type}</div><div class="fs11 text-gray-dark">Current: ${Math.round(a.hours*10)/10} hrs</div></div>
        <div style="text-align:right"><div class="fw700" style="color:${a.remaining<=20?'var(--red)':'var(--yellow)'}">${a.remaining} hrs remaining</div><div class="fs11 text-gray-dark">Next service at ${a.next} hrs</div></div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="section-title" style="margin-top:32px">Hourmeter Log (All Units)</div><div class="card">
    <div class="card-header grid-4s"><div>Unit</div><div>Type</div><div>Last Reading</div><div>Date</div></div>`;
  unitList.forEach(u => {
    html += `<div class="issue-row grid-4s">
      <div class="fw700">${u.unit}</div>
      <div class="text-gray-dark">${UNIT_TYPES[u.type]||u.type}</div>
      <div class="fw700 text-gold">${Math.round(u.hours*10)/10} hrs</div>
      <div class="text-gray-dark">${u.date}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('view-service').innerHTML = html;
}

function renderTransfers() {
  const transfers = INSPECTIONS.filter(i => i.type==='transfer' && i.issues.length > 0);
  let html = `<div class="section-title">Transfer Damage Log</div>
    <p class="text-gray" style="margin-bottom:20px;line-height:1.6">Equipment inspected upon transfer between jobs. Damage found on arrival indicates transit or previous-job damage.</p>`;
  if (transfers.length === 0) {
    html += `<div class="card" style="padding:24px;text-align:center;color:var(--gray-dark)">No transfer inspections with damage recorded.</div>`;
  } else {
    transfers.forEach(t => {
      const d = calcDist(t.lat, t.lng);
      html += `<div class="card" style="padding:16px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between"><div><span class="fw700 fs16">${t.unit}</span> <span class="badge badge-red">${t.alert}</span></div><div class="fs11 text-gray-dark">${t.date}</div></div>
        <div class="fs12 text-gray-light mt4">Transferred from Job ${t.transferFrom||'?'} → Job ${t.job} (${t.site})</div>
        <div class="fs12 text-gray-dark mt4">Inspected by: ${t.operator} | ${d} mi from yard</div>
        <div class="mt8">`;
      t.issues.forEach(iss => {
        html += `<div style="padding:4px 0;display:flex;align-items:center;gap:8px">
          <span class="dot-sm" style="background:${(iss.level||'attention')==='oos'?'var(--red)':'var(--yellow)'}"></span>
          <span class="fw700">${iss.part}:</span> <span class="text-gray-light">${iss.detail||'No details'}</span>
        </div>`;
      });
      html += `</div></div>`;
    });
  }
  document.getElementById('view-transfers').innerHTML = html;
}

// --- MODAL ---
function openModal(groupKey) {
  const groups = getGroupedIssues();
  const g = groups.find(x => x.key === groupKey);
  if (!g) return;

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div class="section-title" style="margin:0 0 8px">Address Issues</div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span class="dot ${g.level==='oos'?'dot-oos':'dot-att'}"></span>
            <span class="fw800 fs16">${g.unit}</span>
            <span class="fs12 text-gray-dark">${g.unitTypeName}</span>
            <span class="badge ${g.level==='oos'?'badge-red':'badge-yellow'}">${g.level==='oos'?'OUT OF SERVICE':'NEEDS ATTENTION'}</span>
          </div>
          <div class="fs11 text-gray-dark">Job ${g.job} - ${g.jobName||g.site}</div>
          <div class="mt8">
            ${g.issues.map(iss => `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
              <span class="dot-sm" style="background:${iss.level==='oos'?'var(--red)':'var(--yellow)'}"></span>
              <span class="fw700">${iss.part}:</span>
              <span class="text-gray-light">${iss.detail||'No details'}</span>
            </div>`).join('')}
          </div>
          <div class="mt8 fs11 text-gray-dark">Reported by ${g.operator} on ${g.date} | ${g.site||'Yard'} | ${g.dist} mi from Yucaipa</div>
        </div>
        <div class="modal-body">
          <div class="fs10 fw700 text-gray" style="letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">Aaron's Disposition</div>
          <textarea id="disp-note" rows="4" placeholder="e.g. Run on flat ground only, call if worsens..."></textarea>
          <div class="notify-bar">📤 Closing will notify: ${g.operator} (operator), foreman, and leadership (Kirby, Karun, Jerry, Derek)</div>
          <div style="display:flex;gap:12px;margin-top:12px">
            <button class="btn-close" onclick="closeIssue('${g.key}')" id="close-btn">Close & Notify</button>
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          </div>
        </div>
      </div>
    </div>`;
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

function closeIssue(groupKey) {
  const note = document.getElementById('disp-note').value.trim();
  if (!note) return;
  const groups = getGroupedIssues();
  const g = groups.find(x => x.key === groupKey);
  if (g) {
    g.issues.forEach(iss => {
      dispositions[iss.subKey] = { note, closedBy:'Aaron Imera', closedAt:new Date().toISOString(), notifyOperator:g.operator, notifyLeadership:true };
    });
  }
  localStorage.setItem('gbe_dispositions', JSON.stringify(dispositions));
  closeModal();
  renderAll();

  // Send disposition to Google Apps Script (writes to sheet + sends emails)
  if (GOOGLE_SHEET_API) {
    fetch(GOOGLE_SHEET_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'disposition',
        inspectionId: g.key,
        issueKeys: g.issues.map(function(iss) { return iss.subKey; }),
        unit: g.unit,
        unitType: g.unitType,
        job: g.job,
        jobName: g.jobName,
        site: g.site,
        alertLevel: g.level === 'oos' ? 'OUT_OF_SERVICE' : 'NEEDS_ATTENTION',
        note: note,
        closedBy: 'Aaron Imera',
        operatorName: g.operator,
        reportDate: g.date,
        issueDetails: g.issues.map(function(iss) { return { part: iss.part, detail: iss.detail }; }),
        parts: g.issues.reduce(function(acc, iss) { acc[iss.subKey] = iss.part; return acc; }, {})
      })
    }).then(function(r) { return r.json(); })
      .then(function(result) { console.log('Disposition saved and notifications sent:', result); })
      .catch(function(err) { console.error('Failed to save disposition to server:', err); });
  }
}

// --- VERIFICATION QUEUE (Aaron) ---
function renderVerification() {
  const el = document.getElementById('view-verification');
  const open = (PENDING_VERIF || []).filter(p => String(p.aaronVerified).toLowerCase() !== 'yes');
  const badge = document.getElementById('verifBadge');
  if (open.length > 0) { badge.style.display = 'inline-block'; badge.textContent = open.length; }
  else { badge.style.display = 'none'; }

  const vLabels = {
    verified: '<span style="color:#2ECC71">✅ Mechanic verified complete</span>',
    parts_on_order: '<span style="color:#F39C12">🟡 Parts on order</span>',
    needs_shop: '<span style="color:#F39C12">🟡 Needs shop time</span>',
    needs_followup: '<span style="color:#F39C12">🟡 Needs follow-up visit</span>',
    not_specified: '<span style="color:#888">⚪ No verification given</span>'
  };

  let html = '<div class="section-title" style="font-size:18px;font-weight:700;margin-bottom:4px">Mechanic Work Pending Verification</div>';
  html += '<div style="color:#888;font-size:12px;margin-bottom:16px">Tickets the field mechanic reported working on. Verify the repair and close the ticket, or send it back to the open board.</div>';

  if (open.length === 0) {
    html += '<div style="text-align:center;padding:60px;color:#888">✅ Nothing pending. All mechanic work has been verified.</div>';
    el.innerHTML = html;
    return;
  }

  open.forEach((p, i) => {
    html += '<div style="background:#1E293B;border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:10px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">';
    html += '<div>';
    html += '<div style="font-weight:700;font-size:15px">' + (p.unit || '?') + ' — ' + (p.part || 'Issue') + '</div>';
    html += '<div style="font-size:12px;color:#94A3B8;margin-top:3px">Ticket: ' + p.ticketKey + ' | Worked by ' + (p.mechanic || '?') + ' on ' + (p.reportedFixedDate || '?') + ' | Report ' + (p.reportId || '') + '</div>';
    html += '<div style="font-size:13px;margin-top:6px">' + (vLabels[p.mechanicVerification] || p.mechanicVerification || '') + '</div>';
    html += '</div>';
    html += '<div style="display:flex;gap:8px">';
    html += '<button onclick="verifyTicket(\'' + p.ticketKey + '\',true)" style="background:#2ECC71;color:#fff;border:none;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:12px">VERIFY & CLOSE</button>';
    html += '<button onclick="verifyTicket(\'' + p.ticketKey + '\',false)" style="background:transparent;color:#E74C3C;border:1px solid #E74C3C;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer;font-size:12px">NOT FIXED — REOPEN</button>';
    html += '</div></div></div>';
  });

  el.innerHTML = html;
}

function verifyTicket(ticketKey, approved) {
  const p = (PENDING_VERIF || []).find(x => x.ticketKey === ticketKey);
  if (!p) return;
  const note = approved
    ? prompt('Verification note (optional):', 'Verified repaired and operational')
    : prompt('Why is it not fixed? (goes back to the open board)', '');
  if (note === null) return;

  p.aaronVerified = approved ? 'yes' : 'rejected';
  renderVerification();

  if (approved) {
    // Close it in the disposition system so it comes off the live board
    dispositions[ticketKey] = { note: 'Mechanic repair verified: ' + note, closedBy: 'Aaron Imera', closedAt: new Date().toISOString() };
    localStorage.setItem('gbe_dispositions', JSON.stringify(dispositions));
    renderAll();
  }

  if (GOOGLE_SHEET_API) {
    fetch(GOOGLE_SHEET_API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'verifyTicket',
        ticketKey: ticketKey,
        approved: approved,
        note: note,
        verifiedBy: 'Aaron Imera'
      })
    }).catch(function(e) { console.error('Verify sync failed', e); });
  }
}
